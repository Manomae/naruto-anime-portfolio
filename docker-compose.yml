version: '3.8'\n\nservices:  \n  mongo:  \n    image: mongo:latest  \n    container_name: mongo  \n    ports:  \n      - '27017:27017'  \n    volumes:  \n      - mongo-data:/data/db  \n    networks:  \n      - app-network\n\n  redis:  \n    image: redis:latest  \n    container_name: redis  \n    ports:  \n      - '6379:6379'\n    networks:  \n      - app-network\n\n  backend:  \n    build:  \n      context: ./backend  \n      dockerfile: Dockerfile  \n    container_name: backend   \n    ports:  \n      - '3000:3000'  \n    environment:  \n      - MONGO_URI=mongodb://mongo:27017/mydatabase  \n    depends_on:  \n      - mongo  \n    networks:  \n      - app-network\n\n  ai_service:  \n    build:  \n      context: ./ai_service  \n      dockerfile: Dockerfile  \n    container_name: ai_service  \n    ports:  \n      - '8000:8000'  \n    environment:  \n      - MONGO_URI=mongodb://mongo:27017/mydatabase  \n    depends_on:  \n      - mongo  \n    networks:  \n      - app-network\n\n  frontend:  \n    build:  \n      context: ./frontend  \n      dockerfile: Dockerfile  \n    container_name: frontend  \n    ports:  \n      - '3001:3001'  \n    depends_on:  \n      - backend  \n    networks:  \n      - app-network\n\nvolumes:  \n  mongo-data:  \n\nnetworks:  \n  app-network:  \n    driver: bridge\n